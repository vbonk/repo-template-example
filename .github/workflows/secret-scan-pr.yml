# Secret Scan — Detect potential secrets in PR diffs
# Scans changed files for API keys, private keys, credentials, and common secret patterns.
# Posts a warning comment if patterns are found (does not block merge — false positives happen).
#
# KNOWN LIMITATION: For PRs from forks, the pull_request event runs with read-only
# permissions — this workflow cannot post comments on fork PRs. GitHub's built-in
# push protection covers this gap server-side for public repos.

name: Secret Scan PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Scan PR diff for secrets
        id: scan
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          echo "--- Scanning PR diff for secret patterns ---"

          # Get changed files in this PR (using env var, not direct interpolation)
          CHANGED=$(git diff --name-only --diff-filter=ACMR "origin/${BASE_REF}...HEAD" -- \
            ':!*.lock' ':!*-lock.*' ':!*.sum' \
            ':!*.png' ':!*.jpg' ':!*.gif' ':!*.ico' ':!*.svg' \
            ':!*.woff' ':!*.woff2' ':!*.pdf' \
            ':!*.example' ':!*.template' \
            2>/dev/null || true)

          if [ -z "$CHANGED" ]; then
            echo "No relevant files changed."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Secret patterns (POSIX-compatible — uses [[:space:]] not \s)
          PATTERNS='(AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|ghs_[a-zA-Z0-9]{36}|sk-ant-[a-zA-Z0-9]+|sk-proj-[a-zA-Z0-9]+|sk-live-[a-zA-Z0-9]+|-----BEGIN[[:space:]]+(RSA[[:space:]]+|EC[[:space:]]+|OPENSSH[[:space:]]+)?PRIVATE[[:space:]]+KEY)'

          FINDINGS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            # Skip markdown and documentation
            case "$file" in
              *.md|*.txt|*.rst) continue ;;
            esac

            MATCHES=$(grep -nE "$PATTERNS" "$file" 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              FINDINGS="${FINDINGS}\n**${file}**:\n\`\`\`\n${MATCHES}\n\`\`\`\n"
            fi
          done <<< "$CHANGED"

          if [ -n "$FINDINGS" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo -e "$FINDINGS" > /tmp/secret-findings.txt
            echo "::warning::Potential secrets detected in PR diff"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No secret patterns found."
          fi

      - name: Post warning comment
        if: steps.scan.outputs.found == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const findings = fs.readFileSync('/tmp/secret-findings.txt', 'utf8');
            const body = [
              '## :warning: Potential Secrets Detected',
              '',
              'The following files contain patterns that may be secrets or credentials:',
              '',
              findings,
              '',
              '**Please verify these are not real secrets before merging.**',
              '',
              'If these are false positives (example values, documentation), you can safely ignore this.',
              '',
              'If real secrets were committed:',
              '1. **Do NOT merge this PR**',
              '2. Rotate the exposed credential immediately',
              '3. Remove the secret from your branch',
              '4. See [SECURITY.md](../blob/main/SECURITY.md) for incident response steps'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
